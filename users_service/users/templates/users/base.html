<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система оценок{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        header { background: #f0f0f0; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; }
        .container { max-width: 900px; margin: 0 auto; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error   { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Система учёта оценок</h1>
            <nav>
                {% if user.is_authenticated %}
                    <a href="{% url 'index' %}">Главная</a>
                    <a href="{% url 'grades' %}">Мои оценки</a>
                    <a href="{% url 'logout' %}">Выйти ({{ user.username }})</a>
                {% else %}
                    <a href="{% url 'index' %}">Главная</a>
                    <a href="{% url 'login' %}">Войти</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
