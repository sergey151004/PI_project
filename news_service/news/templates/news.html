<!DOCTYPE html>
<html>
<head>
    <title>School News</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color:#f4f6f9;
            margin:0;
            padding:0;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:800px;
            margin:40px auto;
        }

        .news-card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .news-title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .news-date{
            color:gray;
            font-size:14px;
            margin-bottom:10px;
        }

        .news-text{
            font-size:16px;
            line-height:1.5;
        }

    </style>
</head>

<body>

<header>
    <h1>School News</h1>
</header>

<div class="container">

    {% for n in news %}

        <div class="news-card">

            <div class="news-title">
                {{ n.title }}
            </div>

            <div class="news-date">
                {{ n.created_at }}
            </div>

            <div class="news-text">
                {{ n.text }}
            </div>

        </div>

    {% empty %}

        <p>No news yet.</p>

    {% endfor %}

</div>

</body>
</html>
